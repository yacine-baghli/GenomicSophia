<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Genomic Co-Pilot — AI Case Triage Dashboard</title>
<meta name="description" content="AI-powered genomic variant triage dashboard with 5-metric scoring for clinical prioritization">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="top-bar">
 <div><h1>🧬 Genomic Co-Pilot</h1><div class="subtitle">AI-Powered Case Triage — SOPHiA DDM™ Integration</div></div>
 <div style="display:flex;align-items:center;gap:.7rem">
  <span id="conn-status"><span class="dot spin"></span>Loading...</span>
  <button class="btn-sm" onclick="toggleApiKeyPanel()" id="key-btn" title="Set LLM API key">⚙️ API Key</button>
  <button class="btn-sm" onclick="toggleTheme()" id="theme-btn">☀️ Light</button>
 </div>
</div>

<!-- API Key panel (hidden by default) -->
<div id="api-key-panel" class="api-key-panel" style="display:none">
 <div class="row" style="align-items:center;gap:.8rem">
  <div class="field" style="flex:0;min-width:100px"><label>Provider</label><select id="key-provider"><option value="anthropic">Claude</option><option value="gemini">Gemini</option><option value="openai">OpenAI</option></select></div>
  <div class="field" style="flex:2"><label>API Key</label><input id="api-key-input" type="password" placeholder="Paste your API key here..."></div>
  <button class="btn-primary" onclick="saveApiKey()">💾 Save Key</button>
  <span id="key-status" style="font-size:.78rem;color:var(--text3)"></span>
 </div>
</div>

<!-- Source selector -->
<div class="panel">
 <div class="tabs">
  <button class="tab active" id="tab-btn-csv" onclick="switchTab('csv',this)">📄 CSV Data</button>
  <button class="tab" id="tab-btn-api" onclick="switchTab('api',this)">🔌 VQS API</button>
 </div>
 <div id="tab-csv" class="tab-body">
  <label class="field-label">Sample files in /samples</label>
  <div id="sample-list" class="sample-chips" style="margin-bottom:1rem">Loading...</div>
  <div class="row" style="align-items:center">
   <div class="field" style="flex:2">
    <label>Add CSV files to /samples</label>
    <input type="file" id="csv-files" accept=".csv,.tsv,.txt" multiple>
   </div>
   <button class="btn-secondary" onclick="uploadFiles()" id="btn-upload">⬆ Add Files</button>
   <div class="field" style="flex:0;min-width:90px"><label>LLM</label><select id="llm-csv"><option value="none">None</option><option value="anthropic">Claude</option><option value="gemini">Gemini</option><option value="openai">OpenAI</option></select></div>
   <button class="btn-primary" onclick="rankAll()" id="btn-rank">🔬 Rank All Cases</button>
  </div>
 </div>
 <div id="tab-api" class="tab-body" style="display:none">
  <div class="row">
   <div class="field"><label>Username</label><input id="username" value="hackathon6@hackathon.com"></div>
   <div class="field"><label>Password</label><input id="password" type="password" value="Gono399764"></div>
   <div class="field" style="flex:2"><label>Dataset Keys (one per line)</label><textarea id="dataset-keys" rows="2"></textarea></div>
   <div class="field" style="flex:0;min-width:90px"><label>LLM</label><select id="llm"><option value="none">None</option><option value="anthropic">Claude</option><option value="gemini">Gemini</option><option value="openai">OpenAI</option></select></div>
   <button class="btn-primary" onclick="runVQS()">🔍 Analyze</button>
  </div>
 </div>
</div>


<div id="cases-grid" class="cases-grid">
 <div class="empty"><div class="icon">⏳</div><p>Loading and ranking sample data...</p></div>
</div>

<!-- Literature Summary Modal -->
<div id="papers-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closePapersModal()">
 <div class="modal">
  <div class="modal-header">
   <h3 id="modal-title">📚 Literature Review</h3>
   <button class="modal-close" onclick="closePapersModal()">✕</button>
  </div>
  <div id="modal-body" class="modal-body">
   <div class="modal-loading"><div class="spinner-lg"></div><p>Searching PubMed & generating AI summary...</p></div>
  </div>
 </div>
</div>

<script src="/static/app.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
  refreshSamples();
  rankAll();
});
</script>
</body>
</html>
